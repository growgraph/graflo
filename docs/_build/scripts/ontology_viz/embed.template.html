<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="graph-view.css" />
</head>
<body class="embed">
  <div class="layout">
    <main class="graph-shell">
      <div class="toolbar embed-toolbar">
        <input id="search" type="search" placeholder="Search classes…" />
        <select id="relation-filter">
          <option value="all">All</option>
          <option value="taxonomy">Taxonomy</option>
          <option value="has">has*</option>
        </select>
        <button id="fit-button" type="button">Fit</button>
        <button id="reset-button" type="button">Reset</button>
      </div>
      <div class="hint">Drag · scroll zoom · click class</div>
      <svg id="graph" aria-label="GraFlo ontology class graph"></svg>
    </main>
  </div>
  <script>window.GRAFLO_ONTOLOGY_GRAPH = {{GRAPH_JSON}};</script>
  <script src="graph-view.js"></script>
</body>
</html>
