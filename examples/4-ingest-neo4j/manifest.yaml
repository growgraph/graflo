schema:
    metadata:
        name: debian-eco
        version: 0.0.1
    graph:
        vertex_config:
            vertices:
            -   name: package
                fields:
                -   name
                -   version
                identity:
                -   name
            -   name: maintainer
                fields:
                -   name
                -   email
                identity:
                -   email
            -   name: bug
                fields:
                -   id
                -   subject
                -   severity
                -   date
                identity:
                -   id
        edge_config:
            edges:
            -   source: package
                target: package
            -   source: maintainer
                target: package
            -   source: package
                target: bug
    db_profile: {}
ingestion_model:
    resources:
    -   name: package
        pipeline:
        -   vertex: package
        -   key: dependencies
            pipeline:
            -   any_key: true
                pipeline:
                -   vertex: package
        -   source: maintainer
            target: package
        -   source: package
            target: package
            relation_from_key: true
        -   key: maintainer
            pipeline:
            -   vertex: maintainer
    -   name: bug
        pipeline:
        -   map:
                package: name
                bug_num: id
        -   vertex: package
        -   vertex: bug
