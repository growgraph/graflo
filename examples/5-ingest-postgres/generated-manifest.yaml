core_schema:
    edge_config:
        edges:
        -   properties:
            -   name: created_at
                type: DATETIME
            relation: follows
            source: users
            target: users
        -   properties:
            -   name: purchase_date
                type: DATETIME
            -   name: quantity
                type: INT
            -   name: total_amount
                type: FLOAT
            relation: purchases
            source: users
            target: products
    vertex_config:
        vertices:
        -   identity:
            -   id
            name: products
            properties:
            -   name: id
                type: INT
            -   name: name
                type: STRING
            -   name: price
                type: FLOAT
            -   name: description
                type: STRING
            -   name: created_at
                type: DATETIME
        -   identity:
            -   id
            name: users
            properties:
            -   name: id
                type: INT
            -   name: name
                type: STRING
            -   name: email
                type: STRING
            -   name: created_at
                type: DATETIME
db_profile:
    db_flavor: tigergraph
    vertex_storage_names:
        products: products
        users: users
metadata:
    name: accounting
