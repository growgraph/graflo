schema:
    metadata:
        name: ticker
    graph:
        vertex_config:
            vertices:
            -   name: ticker
                fields:
                -   oftic
                identity:
                -   oftic
            -   name: metric
                fields:
                -   name
                -   value
                identity:
                -   name
                -   value
                filters:
                -   if_then:
                    -   or:
                        -   field: name
                            foo: __eq__
                            value: Open
                        -   field: name
                            foo: __eq__
                            value: Close
                        -   field: name
                            foo: __eq__
                            value: Volume
                    -   field: value
                        foo: __gt__
                        value: 0
        edge_config:
            edges:
            -   source: ticker
                target: metric
                weights:
                    direct:
                    -   t_obs
                    vertices:
                    -   name: metric
                        fields:
                        -   name
    db_profile:
        vertex_storage_names:
            ticker: tickers
            metric: metrics
        vertex_indexes:
            metric:
            -   type: hash
                unique: false
                fields:
                -   value
            -   type: hash
                unique: false
                fields:
                -   name
        edge_specs:
        -   source: ticker
            target: metric
            purpose:
            indexes:
            -   fields:
                -   _from
                -   _to
                -   t_obs
                -   name
ingestion_model:
    transforms:
    -   name: round_str_ndigits_3_metric
        module: graflo.util.transform
        foo: round_str
        params:
            ndigits: 3
        dress:
            key: name
            value: value
    -   name: int_metric_name_value
        module: builtins
        foo: int
        dress:
            key: name
            value: value
    resources:
    -   name: ticker_data
        apply:
        -   transform:
                call:
                    use: round_str_ndigits_3_metric
                    input:
                    -   Open
        -   transform:
                call:
                    use: round_str_ndigits_3_metric
                    input:
                    -   Close
        -   transform:
                call:
                    use: int_metric_name_value
                    input:
                    -   Volume
        -   transform:
                call:
                    module: graflo.util.transform
                    foo: parse_date_yahoo
                    input:
                    -   Date
                    output:
                    -   t_obs
        -   transform:
                rename:
                    ticker: oftic
        -   vertex: metric
bindings: {}
