schema:
    metadata:
        name: openalex
    graph:
        vertex_config:
            vertices:
            -   name: work
                fields:
                -   _key
                -   doi
                -   title
                -   created_date
                identity:
                -   _key
        edge_config:
            edges: []
    db_profile:
        vertex_indexes:
            work:
            -   unique: false
                fields:
                -   doi
ingestion_model:
    resources:
    -   resource_name: work
        apply:
        -   transform: keep_suffix_id
        -   transform: keep_suffix_id
            params:
                sep: /
                keep:
                -   -2
                -   -1
            input:
            -   doi
            output:
            -   doi
        -   key: referenced_works
            apply:
            -   vertex: work
            -   transform: keep_suffix_id
        -   vertex: work
        -   source: work
            target: work
    transforms:
    -   name: keep_suffix_id
        foo: split_keep_part
        module: graflo.util.transform
        params:
            sep: /
            keep: -1
        input:
        -   id
        output:
        -   _key
bindings: {}
