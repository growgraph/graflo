schema:
    metadata:
        name: tigergraph-sanitize-edges
    graph:
        vertex_config:
            vertices:
            -   name: parcel
                fields:
                -   name: id
                    type: INT
                identity:
                -   id
            -   name: box
                fields:
                -   name: id
                    type: INT
                identity:
                -   id
            -   name: container
                fields:
                -   name
                identity:
                -   name
        edge_config:
            edges:
            -   source: box
                target: parcel
                relation: contains
            -   source: box
                target: box
                relation: contains
            -   source: container
                target: box
                relation: contains
            -   source: container
                target: container
                relation: package
            -   source: container
                target: container
                relation: box
    db_profile:
        db_flavor: tigergraph
ingestion_model:
    resources:
    -   name: parcels
        apply:
        -   vertex: parcel
        -   transform:
                rename:
                    parcel_id: id
    -   name: boxes
        apply:
        -   vertex: box
        -   transform:
                rename:
                    box_id: id
    -   name: containers
        apply:
        -   vertex: container
        -   transform:
                rename:
                    container_name: name
bindings: {}
