schema:
    metadata:
        name: ibes
    graph:
        vertex_config:
            blank_vertices:
            -   publication
            vertices:
            -   name: publication
                properties:
                -   datetime_review
                -   datetime_announce
                identity:
                -   _key
            -   name: ticker
                properties:
                -   cusip
                -   cname
                -   oftic
                identity:
                -   cusip
                -   cname
                -   oftic
            -   name: agency
                properties:
                -   aname
                identity:
                -   aname
            -   name: analyst
                properties:
                -   last_name
                -   initial
                identity:
                -   last_name
                -   initial
            -   name: recommendation
                properties:
                -   erec
                -   etext
                -   irec
                -   itext
                identity:
                -   irec
                -   erec
                -   etext
                -   itext
        edge_config:
            edges:
            -   source: publication
                target: ticker
            -   source: analyst
                target: agency
                properties:
                -   datetime_review
                -   datetime_announce
            -   source: analyst
                target: publication
            -   source: publication
                target: recommendation
    db_profile:
        vertex_storage_names:
            publication: publications
            ticker: tickers
            agency: agencies
            analyst: analysts
            recommendation: recommendations
        vertex_indexes:
            publication:
            -   type: hash
                unique: false
                fields:
                -   datetime_review
            -   type: hash
                unique: false
                fields:
                -   datetime_announce
ingestion_model:
    resources:
    -   name: ibes
        encoding: ISO-8859-1
        apply:
        -   vertex: ticker
        -   vertex: analyst
        -   vertex: recommendation
        -   vertex: agency
        -   transform:
                call:
                    module: graflo.util.transform
                    foo: parse_date_ibes
                    input:
                    -   ANNDATS
                    -   ANNTIMS
                    output:
                    -   datetime_announce
        -   transform:
                call:
                    module: graflo.util.transform
                    foo: parse_date_ibes
                    input:
                    -   REVDATS
                    -   REVTIMS
                    output:
                    -   datetime_review
        -   transform:
                call:
                    module: graflo.util.transform
                    foo: cast_ibes_analyst
                    input:
                    -   ANALYST
                    output:
                    -   last_name
                    -   initial
        -   transform:
                rename:
                    CUSIP: cusip
                    CNAME: cname
                    OFTIC: oftic
        -   transform:
                rename:
                    ESTIMID: aname
        -   transform:
                rename:
                    ERECCD: erec
                    ETEXT: etext
                    IRECCD: irec
                    ITEXT: itext
        -   vertex: publication
        -   source: analyst
            target: agency
            vertex_weights:
            -   name: publication
                keep_vertex_name: false
                fields:
                -   datetime_review
                -   datetime_announce
bindings: {}
