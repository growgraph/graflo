schema:
    metadata:
        name: tigergraph-sanitize
    graph:
        vertex_config:
            vertices:
            -   name: package
                fields:
                -   name: id
                    type: INT
                -   name: SELECT
                    type: STRING
                -   name: FROM
                    type: STRING
                -   name: WHERE
                    type: STRING
                -   name: name
                    type: STRING
                identity:
                -   id
            -   name: users
                fields:
                -   name: id
                    type: INT
                -   name: name
                    type: STRING
                identity:
                -   id
        edge_config:
            edges:
            -   source: package
                target: users
    db_profile:
        db_flavor: tigergraph
        vertex_storage_names:
            package: Package
            users: Users
ingestion_model:
    resources:
    -   name: package
        apply:
        -   vertex: package
bindings: {}
