schema:
    metadata:
        name: openalex
    graph:
        vertex_config:
            vertices:
            -   name: author
                properties:
                -   _key
                identity:
                -   _key
            -   name: institution
                properties:
                -   _key
                identity:
                -   _key
            -   name: work
                properties:
                -   _key
                -   doi
                identity:
                -   _key
        edge_config: []
    db_profile:
        vertex_storage_names:
            author: authors
            institution: institutions
            work: works
ingestion_model:
    resources:
    -   name: authors
        root:
            children:
            -   type: vertex
                name: author
            -   transform:
                    call:
                        use: keep_suffix_id
            -   key: ids
                children: []
            -   key: last_known_institution
                children:
                -   type: vertex
                    name: institution
                    transforms:
                    -   transform:
                            call:
                                use: keep_suffix_id
                -   type: edge
                    edge:
                        source: author
                        target: institution
                    properties:
                    -   updated_date
                    -   created_date
    -   name: works
        root:
            children:
            -   type: vertex
                name: work
                transforms:
                -   transform:
                        call:
                            use: keep_suffix_id
                -   transform:
                        call:
                            use: keep_suffix_id
                            params:
                                sep: /
                                keep:
                                -   -2
                                -   -1
                            input:
                            -   doi
                            output:
                            -   doi
    transforms:
    -   name: keep_suffix_id
        foo: split_keep_part
        module: graflo.util.transform
        params:
            sep: /
            keep: -1
        input:
        -   id
        output:
        -   _key
bindings: {}
