schema:
    metadata:
        name: openalex
    graph:
        vertex_config:
            vertices:
            -   name: institution
                properties:
                -   _key
                -   display_name
                -   country
                -   type
                -   grid
                -   wikidata
                -   mag
                -   created_date
                -   updated_date
                identity:
                -   _key
        edge_config:
            edges: []
    db_profile:
        vertex_storage_names:
            institution: institutions
        vertex_indexes:
            institution:
            -   unique: false
                type: fulltext
                fields:
                -   display_name
            -   unique: false
                fields:
                -   type
ingestion_model:
    resources:
    -   name: institutions
        apply:
        -   vertex: institution
        -   transform:
                call:
                    use: keep_suffix_id
        -   key: associated_institutions
            apply:
            -   vertex: institution
            -   transform:
                    call:
                        use: keep_suffix_id
        -   source: institution
            target: institution
            match_target: associated_institutions
            relation_field: relationship
    transforms:
    -   name: keep_suffix_id
        foo: split_keep_part
        module: graflo.util.transform
        params:
            sep: /
            keep: -1
        input:
        -   id
        output:
        -   _key
bindings: {}
