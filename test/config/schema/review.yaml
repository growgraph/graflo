schema:
    metadata:
        name: review
    graph:
        vertex_config:
            vertices:
            -   name: author
                properties:
                -   id
                -   full_name
                -   hindex
                identity:
                -   id
                -   full_name
            -   name: researchField
                properties:
                -   id
                -   name
                -   level
                identity:
                -   id
        edge_config:
            edges:
            -   source: author
                target: researchField
                relation: belongsTo
    db_profile:
        db_flavor: neo4j
        vertex_storage_names:
            author: Author
            researchField: ResearchField
        vertex_indexes:
            author:
            -   fields:
                -   id
                -   full_name
            researchField:
            -   fields:
                -   id
        edge_specs:
        -   source: author
            target: researchField
            relation: belongsTo
            purpose:
            indexes:
            -   fields:
                -   t_obs
ingestion_model:
    resources:
    -   name: authors
        apply:
        -   vertex: author
            from:
                id: author_id
                full_name: FullName
                hindex: HIndex
        -   vertex: researchField
            from:
                id: research_sector
bindings: {}
