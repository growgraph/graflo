schema:
    metadata:
        name: ticker_history
    graph:
        vertex_config:
            vertices:
            -   name: ticker
                fields:
                -   cusip
                -   cname
                -   oftic
                identity:
                -   cusip
                -   cname
                -   oftic
            -   name: feature
                fields:
                -   name
                -   value
                identity:
                -   name
                -   value
                filters:
                -   or:
                    -   if_then:
                        -   field: name
                            foo: __eq__
                            value: Open
                        -   field: value
                            foo: __gt__
                            value: 0
                    -   if_then:
                        -   field: name
                            foo: __eq__
                            value: Close
                        -   field: value
                            foo: __gt__
                            value: 0
                -   field: name
                    foo: __ne__
                    value: Volume
        edge_config:
            edges:
            -   source: ticker
                target: feature
                weights:
                    direct:
                    -   t_obs
                    vertices:
                    -   name: feature
                        fields:
                        -   name
    db_profile:
        vertex_storage_names:
            ticker: tickers
            feature: features
        vertex_indexes:
            feature:
            -   type: hash
                unique: false
                fields:
                -   value
            -   type: hash
                unique: false
                fields:
                -   name
        edge_indexes:
        -   source: ticker
            target: feature
            purpose:
            indexes:
            -   fields:
                -   _from
                -   _to
                -   t_obs
                -   name
ingestion_model:
    resources:
    -   name: history
        apply:
        -   transform:
                call:
                    module: graflo.util.transform
                    foo: round_str
                    params:
                        ndigits: 3
                    input:
                    -   Open
                    dress:
                        key: name
                        value: value
        -   transform:
                call:
                    module: graflo.util.transform
                    foo: round_str
                    params:
                        ndigits: 3
                    input:
                    -   Close
                    dress:
                        key: name
                        value: value
        -   transform:
                call:
                    module: builtins
                    foo: int
                    input:
                    -   Volume
                    dress:
                        key: name
                        value: value
        -   transform:
                call:
                    module: graflo.util.transform
                    foo: parse_date_yahoo
                    input:
                    -   Date
                    output:
                    -   t_obs
        -   transform:
                rename:
                    __ticker: oftic
bindings: {}
