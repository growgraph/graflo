schema:
    metadata:
        name: companies
    graph:
        vertex_config:
            vertices:
            -   name: company
                properties:
                -   name
                identity:
                -   name
        edge_config:
            edges:
            -   source: company
                target: company
                properties:
                -   date
    db_profile: {}
ingestion_model:
    resources:
    -   name: relations
        apply:
        -   vertex: company
            from:
                name: company_a
        -   vertex: company
            from:
                name: company_b
        -   source: company
            target: company
            relation_field: relation
bindings: {}
